<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz de Engenharia de Software</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .quiz-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 450px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 { margin-bottom: 15px; }

    .option {
      display: block;
      background: #eee;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover { background: #ddd; }

    .correct { background: #28a745 !important; color: white; }
    .wrong { background: #dc3545 !important; color: white; }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover { background: #0056b3; }

    .result { text-align: center; font-size: 18px; }
  </style>
</head>
<body>

<div class="quiz-container">
  <h2 id="question"></h2>
  <div id="options"></div>
  <button onclick="nextQuestion()">Próxima</button>
</div>

<script>
const quiz = [
  [
  {
    "pergunta": "O que é gerenciamento de configuração em software?",
    "alternativas": [
      "Um processo voltado apenas para corrigir erros de interface.",
      "Um conjunto de políticas, processos e ferramentas para controlar mudanças em sistemas de software.",
      "Uma técnica exclusiva para documentação de requisitos.",
      "Um método de treinamento de usuários finais."
    ],
    "resposta": 1
  },
  {
    "pergunta": "Qual é o principal objetivo do capítulo sobre gerenciamento de configuração?",
    "alternativas": [
      "Apresentar processos e ferramentas usados no gerenciamento de configuração.",
      "Ensinar linguagem de programação orientada a objetos.",
      "Explicar apenas como criar interfaces gráficas.",
      "Mostrar exclusivamente técnicas de teste de unidade."
    ],
    "resposta": 0
  },
  {
    "pergunta": "Quais são as quatro atividades centrais do gerenciamento de configuração apresentadas no capítulo?",
    "alternativas": [
      "Modelagem, codificação, testes e implantação.",
      "Planejamento, estimativa, manutenção e auditoria.",
      "Gerenciamento de mudanças, gerenciamento de versões, construção de sistemas e gerenciamento de releases.",
      "Requisitos, design, validação e suporte técnico."
    ],
    "resposta": 2
  },
  {
    "pergunta": "O foco principal do gerenciamento de mudanças é:",
    "alternativas": [
      "Controlar somente o layout das telas do sistema.",
      "Analisar custos e benefícios das mudanças propostas, aprová-las quando necessário e acompanhar os componentes alterados.",
      "Criar campanhas de divulgação do software.",
      "Treinar usuários para utilizar novas funcionalidades."
    ],
    "resposta": 1
  },
  {
    "pergunta": "Qual item normalmente inicia o processo de gerenciamento de mudanças?",
    "alternativas": [
      "Um formulário de solicitação de mudança.",
      "Um manual do usuário.",
      "Uma propaganda do produto.",
      "Um relatório financeiro."
    ],
    "resposta": 0
  },
  {
    "pergunta": "Qual é a função do Comitê de Controle de Mudanças (CCB)?",
    "alternativas": [
      "Executar testes automatizados no sistema.",
      "Projetar a arquitetura física dos servidores.",
      "Avaliar e decidir sobre a aprovação de mudanças propostas.",
      "Criar materiais de marketing para novos releases."
    ],
    "resposta": 2
  },
  {
    "pergunta": "O gerenciamento de versões tem como principal finalidade:",
    "alternativas": [
      "Acompanhar diferentes versões de componentes de software e dos sistemas em que são usados.",
      "Controlar apenas a instalação física dos computadores.",
      "Registrar somente as falhas encontradas pelos usuários.",
      "Substituir totalmente o gerenciamento de mudanças."
    ],
    "resposta": 0
  },
  {
    "pergunta": "No contexto do capítulo, o que é uma codeline?",
    "alternativas": [
      "Um cabo de rede utilizado no servidor de build.",
      "Uma sequência de versões de um componente de software.",
      "Um relatório com defeitos encontrados no sistema.",
      "Uma lista de usuários autorizados a acessar o sistema."
    ],
    "resposta": 1
  },
  {
    "pergunta": "O que representa uma baseline?",
    "alternativas": [
      "Uma coleção de versões específicas de componentes que formam um sistema.",
      "Um tipo de linguagem de programação para builds automatizadas.",
      "Uma técnica de remoção de bugs em produção.",
      "Um manual de treinamento da equipe."
    ],
    "resposta": 0
  },
  {
    "pergunta": "Qual é a utilidade de espaços de trabalho privados no gerenciamento de versões?",
    "alternativas": [
      "Permitir que desenvolvedores trabalhem sem interferir diretamente no trabalho uns dos outros.",
      "Impedir que qualquer alteração seja salva.",
      "Substituir totalmente o repositório principal.",
      "Eliminar a necessidade de controle de versões."
    ],
    "resposta": 0
  },
  {
    "pergunta": "O que significa branching no gerenciamento de versões?",
    "alternativas": [
      "Excluir permanentemente versões antigas do sistema.",
      "Criar ramificações para desenvolver linhas paralelas de evolução do software.",
      "Compactar os arquivos do projeto antes da entrega.",
      "Executar automaticamente os testes de aceitação."
    ],
    "resposta": 1
  },
  {
    "pergunta": "O termo merging refere-se a:",
    "alternativas": [
      "Separar um sistema em vários módulos independentes.",
      "Unir alterações feitas em diferentes versões ou ramificações.",
      "Criar documentação para o usuário final.",
      "Distribuir o software ao mercado."
    ],
    "resposta": 1
  },
  {
    "pergunta": "O que é construção de sistemas?",
    "alternativas": [
      "O processo de treinar usuários finais.",
      "A etapa de definir requisitos de negócio.",
      "O processo de criar um sistema executável a partir da compilação e ligação de componentes, bibliotecas e arquivos de configuração.",
      "A atividade de vender o software ao cliente."
    ],
    "resposta": 2
  },
  {
    "pergunta": "Qual é uma das principais vantagens da automação da construção do sistema?",
    "alternativas": [
      "Aumentar a quantidade de trabalho manual.",
      "Reduzir erros e tornar o processo mais rápido e confiável.",
      "Eliminar a necessidade de versões.",
      "Impedir a criação de novas funcionalidades."
    ],
    "resposta": 1
  },
  {
    "pergunta": "A integração contínua está relacionada a:",
    "alternativas": [
      "Reconstruir e integrar frequentemente a linha principal do sistema.",
      "Realizar apenas uma build por ano.",
      "Executar somente atividades de marketing.",
      "Substituir completamente os testes de software."
    ],
    "resposta": 0
  },
  {
    "pergunta": "Para que servem timestamps ou checksums na construção de sistemas?",
    "alternativas": [
      "Para escolher o nome comercial do produto.",
      "Para definir preços de venda do software.",
      "Para identificar o que precisa ser recompilado e evitar recompilações desnecessárias.",
      "Para registrar presença da equipe nas reuniões."
    ],
    "resposta": 2
  },
  {
    "pergunta": "Segundo o capítulo, o que é um release de sistema?",
    "alternativas": [
      "Uma versão de software distribuída aos clientes.",
      "Qualquer arquivo temporário salvo pelo programador.",
      "Um documento de requisitos ainda não validado.",
      "Uma cópia incompleta usada apenas para estudo interno."
    ],
    "resposta": 0
  },
  {
    "pergunta": "Qual é a diferença básica entre versão e release?",
    "alternativas": [
      "Não existe diferença entre os dois termos.",
      "Versão é sempre externa e release é sempre interna.",
      "Versão é qualquer estado identificado do sistema, enquanto release é uma versão preparada para entrega aos usuários.",
      "Release é apenas o código-fonte e versão é apenas a documentação."
    ],
    "resposta": 2
  },
  {
    "pergunta": "Como o capítulo diferencia releases principais de releases menores?",
    "alternativas": [
      "Releases principais trazem mudanças mais significativas, enquanto os menores costumam focar em correções e ajustes.",
      "Releases menores sempre incluem mais funcionalidades do que os principais.",
      "Releases principais são usados apenas em projetos acadêmicos.",
      "Não há distinção entre release principal e release menor."
    ],
    "resposta": 0
  },
  {
    "pergunta": "Qual alternativa descreve corretamente a relação entre as quatro áreas do gerenciamento de configuração?",
    "alternativas": [
      "As áreas são independentes e não se influenciam.",
      "O gerenciamento de mudanças define o que alterar, o de versões controla as instâncias, a construção gera o executável e o gerenciamento de releases cuida da entrega.",
      "A construção de sistemas substitui o gerenciamento de releases.",
      "O gerenciamento de versões serve apenas para fins de marketing."
    ],
    "resposta": 1
  }
]
];

let current = 0;
let score = 0;
let answered = false;

function loadQuestion() {
  const q = quiz[current];

  document.getElementById("question").innerText =
    `(${current + 1}/${quiz.length}) ${q.pergunta}`;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.alternativas.forEach((alt, index) => {
    const btn = document.createElement("div");
    btn.classList.add("option");
    btn.innerText = alt;
    btn.onclick = () => selectOption(index, btn);
    optionsDiv.appendChild(btn);
  });

  answered = false;
}

function selectOption(index, element) {
  if (answered) return;

  const correctIndex = quiz[current].resposta;
  const options = document.querySelectorAll(".option");

  if (index === correctIndex) {
    element.classList.add("correct");
    score++;
  } else {
    element.classList.add("wrong");
    options[correctIndex].classList.add("correct");
  }

  answered = true;
}

function nextQuestion() {
  if (!answered) {
    alert("Responda antes de continuar!");
    return;
  }

  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.querySelector(".quiz-container").innerHTML = `
    <div class="result">
      <h2>Resultado</h2>
      <p>Você acertou ${score} de ${quiz.length} questões!</p>
      <button onclick="location.reload()">Refazer</button>
    </div>
  `;
}

loadQuestion();
</script>

</body>
</html>
