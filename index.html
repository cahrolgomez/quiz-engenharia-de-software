<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz de Engenharia de Software</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .quiz-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 450px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 { margin-bottom: 15px; }

    .option {
      display: block;
      background: #eee;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover { background: #ddd; }

    .correct { background: #28a745 !important; color: white; }
    .wrong { background: #dc3545 !important; color: white; }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover { background: #0056b3; }

    .result { text-align: center; font-size: 18px; }
  </style>
</head>
<body>

<div class="quiz-container">
  <h2 id="question"></h2>
  <div id="options"></div>
  <button onclick="nextQuestion()">Próxima</button>
</div>

<script>
const quiz = [
  {
    "pergunta": "Qual é um dos principais objetivos do teste de software, segundo o texto?",
    "alternativas": [
      "Reduzir o número de usuários do sistema.",
      "Demonstrar que o software atende aos requisitos e descobrir defeitos antes do uso.",
      "Eliminar completamente a necessidade de manutenção.",
      "Substituir o processo de desenvolvimento."
    ],
    "resposta": 1
  },
  {
    "pergunta": "O que caracteriza os testes de validação?",
    "alternativas": [
      "São projetados para expor falhas com entradas obscuras.",
      "Buscam demonstrar que o sistema funciona corretamente com entradas esperadas.",
      "São usados apenas após a entrega do sistema.",
      "Servem exclusivamente para medir desempenho."
    ],
    "resposta": 1
  },
  {
    "pergunta": "Qual é o foco principal dos testes de defeitos?",
    "alternativas": [
      "Comprovar que todos os requisitos foram bem documentados.",
      "Melhorar apenas a interface gráfica do sistema.",
      "Descobrir situações em que o software se comporta de maneira incorreta ou indesejada.",
      "Treinar os usuários finais do sistema."
    ],
    "resposta": 2
  },
  {
    "pergunta": "Segundo a citação de Edsger Dijkstra mencionada no texto, os testes podem:",
    "alternativas": [
      "Provar a ausência total de erros.",
      "Mostrar apenas a presença de erros, não a sua ausência.",
      "Substituir completamente as inspeções.",
      "Eliminar a necessidade de validação."
    ],
    "resposta": 1
  },
  {
    "pergunta": "Qual frase representa corretamente a diferença entre validação e verificação?",
    "alternativas": [
      "Validação pergunta se estamos construindo o produto certo; verificação pergunta se estamos construindo o produto da maneira certa.",
      "Validação e verificação significam exatamente a mesma coisa.",
      "Verificação pergunta se o cliente gostou do sistema; validação pergunta se o código compila.",
      "Validação serve só para sistemas web; verificação, só para sistemas embarcados."
    ],
    "resposta": 0
  },
  {
    "pergunta": "Qual das alternativas apresenta uma vantagem da inspeção de software em relação aos testes?",
    "alternativas": [
      "Permite detectar defeitos sem executar o programa e pode encontrar vários erros em uma única sessão.",
      "Garante automaticamente que o sistema está livre de falhas.",
      "Substitui totalmente os testes de desempenho.",
      "Dispensa conhecimento sobre o domínio da aplicação."
    ],
    "resposta": 0
  },
  {
    "pergunta": "Segundo o texto, por que as inspeções não podem substituir completamente os testes de software?",
    "alternativas": [
      "Porque inspeções só podem ser feitas depois da entrega do sistema.",
      "Porque inspeções não são boas para descobrir problemas de interação, timing ou desempenho.",
      "Porque inspeções exigem execução contínua do programa.",
      "Porque inspeções só funcionam em software pequeno."
    ],
    "resposta": 1
  },
  {
    "pergunta": "Quais são os três estágios de teste pelos quais um software comercial geralmente passa?",
    "alternativas": [
      "Teste inicial, teste intermediário e teste final.",
      "Teste unitário, teste estrutural e teste visual.",
      "Testes de desenvolvimento, testes de release e testes de usuário.",
      "Teste de código, teste de documentação e teste de marketing."
    ],
    "resposta": 2
  },
  {
    "pergunta": "Qual é o objetivo principal dos testes de release?",
    "alternativas": [
      "Treinar usuários para usar o sistema.",
      "Verificar se o sistema atende aos requisitos dos stakeholders antes de ser liberado.",
      "Substituir o teste unitário.",
      "Corrigir automaticamente os defeitos encontrados."
    ],
    "resposta": 1
  },
  {
    "pergunta": "O que são testes de usuário?",
    "alternativas": [
      "Testes realizados apenas por programadores seniores.",
      "Testes feitos em laboratório sem participação externa.",
      "Testes em que usuários ou potenciais usuários avaliam o sistema em seu próprio ambiente.",
      "Testes focados exclusivamente em banco de dados."
    ],
    "resposta": 2
  },
  {
    "pergunta": "Quais são os três níveis de granularidade dos testes de desenvolvimento citados no texto?",
    "alternativas": [
      "Teste de interface, teste de tela e teste de relatório.",
      "Teste unitário, teste de componentes e teste de sistema.",
      "Teste alfa, teste beta e teste de aceitação.",
      "Teste manual, teste automático e teste híbrido."
    ],
    "resposta": 1
  },
  {
    "pergunta": "No teste unitário, o foco principal deve estar em:",
    "alternativas": [
      "Testar a funcionalidade de unidades individuais, como métodos ou classes.",
      "Avaliar contratos comerciais do software.",
      "Analisar exclusivamente a aceitação do cliente.",
      "Verificar apenas a documentação do projeto."
    ],
    "resposta": 0
  },
  {
    "pergunta": "Ao testar classes de objetos, o texto recomenda que o testador:",
    "alternativas": [
      "Teste apenas o construtor da classe.",
      "Teste todas as operações, verifique atributos e coloque o objeto em todos os estados possíveis.",
      "Ignore mudanças de estado para simplificar os testes.",
      "Realize somente testes manuais."
    ],
    "resposta": 1
  },
  {
    "pergunta": "Qual técnica de teste de caixa-preta é citada como forma de identificar grupos de entradas tratadas da mesma maneira?",
    "alternativas": [
      "Análise sintática.",
      "Refatoração incremental.",
      "Particionamento de equivalência.",
      "Compilação cruzada."
    ],
    "resposta": 2
  },
  {
    "pergunta": "O que caracteriza o Desenvolvimento Dirigido a Testes (TDD)?",
    "alternativas": [
      "Escrever o código completo antes de pensar nos testes.",
      "Criar testes automatizados depois da implantação do sistema.",
      "Projetar e escrever os testes antes de desenvolver o código funcional.",
      "Focar exclusivamente em testes manuais."
    ],
    "resposta": 2
  },
  {
    "pergunta": "O que é teste de regressão?",
    "alternativas": [
      "Teste realizado apenas com usuários iniciantes.",
      "Reexecução de testes anteriores para verificar se mudanças não introduziram novos bugs.",
      "Teste voltado exclusivamente para desempenho gráfico.",
      "Teste que substitui a depuração."
    ],
    "resposta": 1
  },
  {
    "pergunta": "Para que servem os mocks ou objetos simulados nos testes?",
    "alternativas": [
      "Para substituir funcionalidades externas ou ainda não implementadas durante os testes.",
      "Para eliminar a necessidade de casos de teste.",
      "Para gerar código automaticamente em produção.",
      "Para documentar requisitos não funcionais."
    ],
    "resposta": 0
  },
  {
    "pergunta": "Qual alternativa apresenta corretamente tipos de erros de interface mencionados no texto?",
    "alternativas": [
      "Erros de compilação, erros tipográficos e erros visuais.",
      "Mau uso de interface, mau entendimento da interface e erros de timing.",
      "Erros de marketing, erros comerciais e erros de suporte.",
      "Erros de impressão, erros de senha e erros de instalação."
    ],
    "resposta": 1
  },
  {
    "pergunta": "Qual é a diferença entre teste de performance e teste de estresse?",
    "alternativas": [
      "Não há diferença entre eles.",
      "Teste de performance verifica o comportamento sob a carga planejada; teste de estresse força o sistema além dos limites.",
      "Teste de performance é manual e teste de estresse é sempre automático.",
      "Teste de estresse serve apenas para interfaces gráficas."
    ],
    "resposta": 1
  },
  {
    "pergunta": "Quais são os tipos de teste de usuário citados no texto?",
    "alternativas": [
      "Teste local, remoto e distribuído.",
      "Teste técnico, administrativo e operacional.",
      "Teste alfa, teste beta e teste de aceitação.",
      "Teste de código, teste estrutural e teste visual."
    ],
    "resposta": 2
  }
]

let current = 0;
let score = 0;
let answered = false;

function loadQuestion() {
  const q = quiz[current];

  document.getElementById("question").innerText =
    `(${current + 1}/${quiz.length}) ${q.pergunta}`;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.alternativas.forEach((alt, index) => {
    const btn = document.createElement("div");
    btn.classList.add("option");
    btn.innerText = alt;
    btn.onclick = () => selectOption(index, btn);
    optionsDiv.appendChild(btn);
  });

  answered = false;
}

function selectOption(index, element) {
  if (answered) return;

  const correctIndex = quiz[current].resposta;
  const options = document.querySelectorAll(".option");

  if (index === correctIndex) {
    element.classList.add("correct");
    score++;
  } else {
    element.classList.add("wrong");
    options[correctIndex].classList.add("correct");
  }

  answered = true;
}

function nextQuestion() {
  if (!answered) {
    alert("Responda antes de continuar!");
    return;
  }

  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.querySelector(".quiz-container").innerHTML = `
    <div class="result">
      <h2>Resultado</h2>
      <p>Você acertou ${score} de ${quiz.length} questões!</p>
      <button onclick="location.reload()">Refazer</button>
    </div>
  `;
}

loadQuestion();
</script>

</body>
</html>
