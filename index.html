<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz de Engenharia de Software</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .quiz-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 450px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 { margin-bottom: 15px; }

    .option {
      display: block;
      background: #eee;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover { background: #ddd; }

    .correct { background: #28a745 !important; color: white; }
    .wrong { background: #dc3545 !important; color: white; }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover { background: #0056b3; }

    .result { text-align: center; font-size: 18px; }
  </style>
</head>
<body>

<div class="quiz-container">
  <h2 id="question"></h2>
  <div id="options"></div>
  <button onclick="nextQuestion()">Próxima</button>
</div>

<script>
const quiz = [
  { pergunta: "O que são as etapas de projeto e implementação no desenvolvimento de software?", alternativas: ["Fases de testes e validação do sistema","Estágios onde o software executável é desenvolvido","Processos de manutenção e suporte","Atividades exclusivas de documentação"], resposta: 1 },
  { pergunta: "O que significa a intercalação no processo de desenvolvimento?", alternativas: ["Separação total entre projeto e implementação","Execução apenas da implementação","Projeto e implementação influenciam-se mutuamente","Uso de múltiplas linguagens"], resposta: 2 },
  { pergunta: "O que é o projeto de software?", alternativas: ["Execução do código","Testes automatizados","Atividade criativa de identificar componentes e relações","Instalação do sistema"], resposta: 2 },
  { pergunta: "O que caracteriza um sistema orientado a objetos?", alternativas: ["Uso de funções","Objetos sem interação","Objetos interativos com estado próprio","Apenas dados"], resposta: 2 },
  { pergunta: "Qual é a primeira etapa do projeto orientado a objetos?", alternativas: ["Identificar objetos","Projetar arquitetura","Definir contexto e interações","Especificar interfaces"], resposta: 2 },
  { pergunta: "Qual é o objetivo da arquitetura de software?", alternativas: ["Criar testes","Organizar componentes","Executar software","Documentar requisitos"], resposta: 1 },
  { pergunta: "O que a análise gramatical ajuda a identificar?", alternativas: ["Erros de código","Substantivos e verbos","Banco de dados","Interfaces"], resposta: 1 },
  { pergunta: "O que os modelos estruturais da UML descrevem?", alternativas: ["Comportamento","Fluxo","Estrutura estática","Testes"], resposta: 2 },
  { pergunta: "Qual diagrama mostra interações?", alternativas: ["Classe","Estado","Sequência","Componentes"], resposta: 2 },
  { pergunta: "O que é um padrão de projeto?", alternativas: ["Código pronto","Linguagem","Solução reutilizável","Teste"], resposta: 2 },
  { pergunta: "Elemento de um padrão?", alternativas: ["Código","Compilador","Problema","Hardware"], resposta: 2 },
  { pergunta: "O que faz o Observer?", alternativas: ["Controla versões","Notifica mudanças","Compila código","Testa"], resposta: 1 },
  { pergunta: "Objetivo do reúso?", alternativas: ["Aumentar tempo","Reduzir custos","Evitar libs","Criar código maior"], resposta: 1 },
  { pergunta: "Gerenciamento de versões?", alternativas: ["Executa","Controla edições","Cria interface","Testa"], resposta: 1 },
  { pergunta: "O que é Host?", alternativas: ["Executa","Desenvolve","Armazena","Usuário"], resposta: 1 },
  { pergunta: "Característica da GPL?", alternativas: ["Fechado","Open source obrigatório","Sem modificação","Empresa"], resposta: 1 },
  { pergunta: "O que a BSD permite?", alternativas: ["Acadêmico","Gratuito","Proprietário","Sem modificação"], resposta: 2 },
  { pergunta: "Qual é o objetivo de especificar interfaces no projeto orientado a objetos?", alternativas: ["Definir o design visual do sistema","Permitir que o desenvolvimento ocorra em paralelo","Executar o software automaticamente","Criar banco de dados"], resposta: 1 },
  { pergunta: "O que descrevem os modelos dinâmicos na UML?", alternativas: ["A estrutura estática do sistema","O armazenamento de dados","O comportamento e as interações ao longo do tempo","A organização dos arquivos"], resposta: 2 },
  { pergunta: "O que é integração de sistemas no gerenciamento de configuração?", alternativas: ["Criação de interfaces gráficas","Definição de quais versões compõem o sistema final","Execução de testes automatizados","Desenvolvimento de código"], resposta: 1 }

];

let current = 0;
let score = 0;
let answered = false;

function loadQuestion() {
  const q = quiz[current];
  document.getElementById("question").innerText = q.pergunta;
  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.alternativas.forEach((alt, index) => {
    const btn = document.createElement("div");
    btn.classList.add("option");
    btn.innerText = alt;
    btn.onclick = () => selectOption(index, btn);
    optionsDiv.appendChild(btn);
  });
  answered = false;
}

function selectOption(index, element) {
  if (answered) return;

  const correctIndex = quiz[current].resposta;
  const options = document.querySelectorAll(".option");

  if (index === correctIndex) {
    element.classList.add("correct");
    score++;
  } else {
    element.classList.add("wrong");
    options[correctIndex].classList.add("correct");
  }

  answered = true;
}

function nextQuestion() {
  if (!answered) {
    alert("Responda antes de continuar!");
    return;
  }

  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.querySelector(".quiz-container").innerHTML = `
    <div class="result">
      <h2>Resultado</h2>
      <p>Você acertou ${score} de ${quiz.length} questões!</p>
      <button onclick="location.reload()">Refazer</button>
    </div>
  `;
}

loadQuestion();
</script>

</body>
</html>
